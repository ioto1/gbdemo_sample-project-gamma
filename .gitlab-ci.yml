# Project Gamma — CI Pipeline

include:
  - project: 'franka-dev/devportal/doc-converter'
    ref: main
    file: 'ci-templates/docs-pipeline.yml'

stages:
  - test
  - docs

variables:
  DOC_PROJECT_NAME: "gamma"
  DOC_SOURCE_DIR: "docs/"

# ── ML model tests ────────────────────────────────────────────────────────────

unit-tests:
  stage: test
  image: python:3.12
  script:
    - pip install -e ".[dev]"
    - pytest tests/unit/ -n auto --junitxml=report.xml
  artifacts:
    reports:
      junit: report.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

model-validation:
  stage: test
  image: registry.franka.de/ai/project-gamma:latest
  script:
    - python -m gamma.learner.evaluate
        --model models/dexnet4-franka.onnx
        --test-data data/test/
        --threshold 0.85
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Docs pipeline ─────────────────────────────────────────────────────────────

convert-docs:
  extends: .docs-conversion
  variables:
    DOC_PROJECT_NAME: "gamma"
    DOC_SOURCE_DIR: "docs/"
