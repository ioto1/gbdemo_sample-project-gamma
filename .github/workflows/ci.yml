# Project Gamma — CI Pipeline
#
# Runs Python unit tests and model validation on PRs and main pushes.
# Triggers doc-to-gitbook conversion when docs/ change on main.

name: CI

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - docs/**
      - pyproject.toml
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - .github/workflows/ci.yml

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          pip install -e ".[dev]"
          pytest tests/unit/ -n auto --junitxml=report.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-gamma-unit
          path: report.xml

  model-validation:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/franka/ai/project-gamma:latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate model
        run: |
          python -m gamma.learner.evaluate \
            --model models/dexnet4-franka.onnx \
            --test-data data/test/ \
            --threshold 0.85

  docs:
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    uses: ioto1/gbdemo_doc-converter/.github/workflows/docs-conversion.yml@main
    with:
      project-name: gamma
      source-dir: docs/
    secrets:
      deploy-key: ${{ secrets.GITBOOK_DEPLOY_KEY }}
