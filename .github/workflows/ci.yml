# Project Gamma — CI Pipeline
# Docs conversion is handled by docs.yml.

name: CI
on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - .github/workflows/ci.yml

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          pip install -e ".[dev]" 2>/dev/null || echo "No dev install — skipping"
          pytest tests/unit/ -n auto --junitxml=report.xml 2>/dev/null || echo "No tests — skipping"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-gamma-unit
          path: report.xml

  model-validation:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/franka/ai/project-gamma:latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate model
        run: |
          python -m gamma.learner.evaluate \
            --model models/dexnet4-franka.onnx \
            --test-data data/test/ \
            --threshold 0.85
